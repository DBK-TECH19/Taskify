<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskify - Register</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
        <h2 class="text-3xl font-bold text-center text-indigo-600 mb-2">Taskify</h2>
        <p class="text-center text-gray-500 mb-6">Create a new account to get started</p>
        
        <div id="errorMessage" class="hidden bg-red-100 text-red-700 p-3 rounded-lg text-sm mb-4"></div>

        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
                <input type="text" id="username" required class="w-full border border-gray-300 rounded-lg p-2.5 focus:outline-indigo-600">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <input type="password" id="password" required class="w-full border border-gray-300 rounded-lg p-2.5 focus:outline-indigo-600">
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white font-medium p-2.5 rounded-lg hover:bg-indigo-700 transition cursor-pointer">
                Sign Up
            </button>
        </form>
        <p class="text-sm text-center text-gray-600 mt-4">
            Already have an account? <a href="login.html" class="text-indigo-600 hover:underline">Log In</a>
        </p>
    </div>

    <script>
        // This must be your live Render URL, not http://127.0.0.1:5000
const API_BASE = "https://taskify-urwo.onrender.com";
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');

            try {
                const response = await fetch('http://127.0.0.1:5000/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();

                if (response.ok) {
                    alert('Registration successful! Redirecting to login...');
                    window.location.href = 'login.html';
                } else {
                    errorDiv.textContent = data.error || 'Registration failed.';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.textContent = 'Cannot connect to backend server.';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
